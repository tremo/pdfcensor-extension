name: Build & Release Extension

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build Chrome zip
        run: npm run zip

      - name: Build Firefox zip
        run: npm run zip:firefox

      - name: Prepare release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p release
          cp .output/*-chrome-mv3.zip "release/pdfcensor-chrome-v${VERSION}.zip"
          cp .output/*-chrome-mv3.zip "release/pdfcensor-edge-v${VERSION}.zip"
          cp .output/*-firefox-mv2.zip "release/pdfcensor-firefox-v${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.zip
