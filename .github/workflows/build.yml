name: Build & Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run lint

      - name: Build Chrome zip
        run: npm run zip

      - name: Build Firefox zip
        run: npm run zip:firefox

      - name: Prepare release artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          mkdir -p release
          cp .output/*-chrome-mv3.zip "release/pdfcensor-chrome-v${VERSION}.zip"
          cp .output/*-chrome-mv3.zip "release/pdfcensor-edge-v${VERSION}.zip"
          cp .output/*-firefox-mv2.zip "release/pdfcensor-firefox-v${VERSION}.zip"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*.zip

      - name: Upload artifacts (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips-v${{ github.event.inputs.version }}
          path: release/*.zip
